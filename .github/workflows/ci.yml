# ============================================================
# Pacha-Chain-Origin — Unified DevSecOps Pipeline
# ============================================================
# All 6 jobs run on EVERY push and PR.
# Runner: ubuntu-latest ONLY (public repo, no self-hosted).
# No external private workflows. Minimal secrets.
# ============================================================

name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main]

# Cancel redundant runs on the same PR/branch
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ── Top-level permissions: least privilege ──
permissions:
  contents: read

# ============================================================
# JOBS
# ============================================================

jobs:
  # ──────────────────────────────────────────────────────────
  # 1. SECRET SCAN — Gitleaks 8.21.2
  #    Runs on push AND PR. Uses CLI directly (no license needed).
  # ──────────────────────────────────────────────────────────
  secret-scan:
    name: "🔐 Secret Scan"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks

      - name: Run Gitleaks
        run: |
          gitleaks detect \
            --source . \
            --config .github/.gitleaks.toml \
            --verbose \
            --no-banner

  # ──────────────────────────────────────────────────────────
  # 2. DEPENDENCY SCAN — Trivy 0.58.1
  #    Warns on HIGH/CRITICAL but does NOT block.
  # ──────────────────────────────────────────────────────────
  dependency-scan:
    name: "📦 Dependency Scan"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Cache Trivy DB
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: trivy-db-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            trivy-db-${{ runner.os }}-

      - name: Run Trivy (filesystem mode)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "table"
          severity: "HIGH,CRITICAL"
          scanners: "vuln"
          exit-code: "1"

  # ──────────────────────────────────────────────────────────
  # 3. SAST SCAN — Semgrep p/ci
  #    Warns but does NOT block.
  # ──────────────────────────────────────────────────────────
  sast-scan:
    name: "🛡️ SAST Scan"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    container:
      image: semgrep/semgrep:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run Semgrep (local mode, no login)
        run: |
          semgrep scan \
            --config p/ci \
            --exclude node_modules \
            --exclude dist \
            --exclude .next \
            --exclude lib \
            --json \
            --output semgrep-results.json \
            || true
          echo "=== Semgrep Summary ==="
          semgrep scan \
            --config p/ci \
            --exclude node_modules \
            --exclude dist \
            --exclude .next \
            --exclude lib \
            --text \
            || true

  # ──────────────────────────────────────────────────────────
  # 4. LINT — ESLint 9 + sonarjs 3
  #    Fails on errors, warnings allowed.
  # ──────────────────────────────────────────────────────────
  lint:
    name: "🧹 Lint"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint (errors fail, warnings allowed)
        run: npx eslint src/

  # ──────────────────────────────────────────────────────────
  # 5. TEST — Foundry + Next.js build
  #    Excludes PostDeployVerification (requires deployed contract).
  # ──────────────────────────────────────────────────────────
  test:
    name: "🧪 Test"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Run Solidity tests
        env:
          FOUNDRY_PROFILE: ci
        run: forge test --no-match-contract PostDeployVerification -vvv

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend (type-check + compile)
        working-directory: frontend
        run: npm run build

  # ──────────────────────────────────────────────────────────
  # 6. DUPLICATION — jscpd 4.0.5
  #    Warns if >5% duplication but does NOT block.
  # ──────────────────────────────────────────────────────────
  duplication:
    name: "📋 Duplication"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run jscpd
        run: |
          npx jscpd@4.0.5 \
            frontend/src/ src/ scripts/ \
            --config .github/.jscpd.json
