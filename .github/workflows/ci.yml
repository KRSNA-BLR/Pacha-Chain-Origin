# ============================================================
# Pacha-Chain-Origin — Unified DevSecOps Pipeline
# ============================================================
# Single pipeline for PR (security) and CI (quality).
# Runner: ubuntu-latest ONLY (public repo, no self-hosted).
# No external private workflows. Minimal secrets.
# ============================================================

name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main]

# Cancel redundant runs on the same PR/branch
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ── Top-level permissions: least privilege ──
permissions:
  contents: read

# ============================================================
# JOBS
# ============================================================

jobs:
  # ──────────────────────────────────────────────────────────
  # 1. SECRET SCAN — Gitleaks 8.21.2 (PR only)
  #    ALWAYS fails if secrets are found.
  #    NEVER prints secret values in logs.
  # ──────────────────────────────────────────────────────────
  secret-scan:
    if: github.event_name == 'pull_request'
    name: "🔐 Secret Scan"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout (no credentials persisted)
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0  # full history for git-log scan

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        with:
          version: "8.21.2"
        env:
          GITLEAKS_CONFIG: .github/.gitleaks.toml
          GITLEAKS_ENABLE_SUMMARY: false   # Do NOT leak findings into GITHUB_STEP_SUMMARY

  # ──────────────────────────────────────────────────────────
  # 2. DEPENDENCY SCAN — Trivy 0.58.1 (PR only)
  #    Warns on HIGH/CRITICAL but does NOT block merge.
  # ──────────────────────────────────────────────────────────
  dependency-scan:
    if: github.event_name == 'pull_request'
    name: "📦 Dependency Scan"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true   # warn only — never blocks
    steps:
      - name: Checkout (no credentials persisted)
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Cache Trivy DB
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: trivy-db-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            trivy-db-${{ runner.os }}-

      - name: Run Trivy (filesystem mode)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "table"
          severity: "HIGH,CRITICAL"
          scanners: "vuln"
          exit-code: "1"

  # ──────────────────────────────────────────────────────────
  # 3. SAST SCAN — Semgrep p/ci (PR only)
  #    Local mode — no SEMGREP_APP_TOKEN needed.
  #    Warns but does NOT block merge.
  # ──────────────────────────────────────────────────────────
  sast-scan:
    if: github.event_name == 'pull_request'
    name: "🛡️ SAST Scan"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true   # warn only — never blocks
    container:
      image: semgrep/semgrep:latest
    steps:
      - name: Checkout (no credentials persisted)
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run Semgrep (local mode, no login)
        run: |
          semgrep scan \
            --config p/ci \
            --exclude node_modules \
            --exclude dist \
            --exclude .next \
            --exclude lib \
            --json \
            --output semgrep-results.json \
            || true
          # Show summary in logs (no secrets — SAST only detects code patterns)
          echo "=== Semgrep Summary ==="
          semgrep scan \
            --config p/ci \
            --exclude node_modules \
            --exclude dist \
            --exclude .next \
            --exclude lib \
            --text \
            || true

  # ──────────────────────────────────────────────────────────
  # 4. LINT — ESLint 9 + sonarjs 3 (PR + push)
  #    Fails on errors.
  # ──────────────────────────────────────────────────────────
  lint:
    name: "🧹 Lint"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint (errors fail, warnings allowed)
        run: npx eslint src/ --max-warnings -1

  # ──────────────────────────────────────────────────────────
  # 5. TEST — Foundry + Next.js build (PR + push)
  #    Fails if tests fail or build breaks.
  # ──────────────────────────────────────────────────────────
  test:
    name: "🧪 Test"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive  # needed for lib/forge-std, lib/openzeppelin

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Run Solidity tests
        run: forge test --profile ci -vvv

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend (type-check + compile)
        working-directory: frontend
        run: npm run build

  # ──────────────────────────────────────────────────────────
  # 6. DUPLICATION — jscpd 4.0.5 (PR + push)
  #    Warns if >5% duplication but does NOT block.
  # ──────────────────────────────────────────────────────────
  duplication:
    name: "📋 Duplication"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true   # warn only — never blocks
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run jscpd
        run: |
          npx jscpd@4.0.5 \
            frontend/src/ src/ scripts/ \
            --config .github/.jscpd.json
