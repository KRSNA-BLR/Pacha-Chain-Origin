[profile.default]
# Versión de Solidity - Usamos 0.8.24 para features estables
solc_version = "0.8.24"

# Carpetas del proyecto
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"

# Optimizador - 200 runs es buen balance entre gas deployment y gas ejecución
optimizer = true
optimizer_runs = 200

# EVM versión - cancun requerido por OpenZeppelin 5.x (mcopy opcode)
evm_version = "cancun"

# Formato de errores legible
ast = true

# Remappings
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/"
]

# Verbosidad de tests: 3 = show logs, traces for failing tests
verbosity = 3

# ffi deshabilitado por seguridad
ffi = false

[profile.default.fuzz]
# Fuzz testing con 256 runs (suficiente para desarrollo)
runs = 256
max_test_rejects = 65536
seed = "0x1"

[profile.default.invariant]
runs = 256
depth = 15
fail_on_revert = false

# CI profile con más runs de fuzz
[profile.ci]
fuzz = { runs = 1000 }
invariant = { runs = 500, depth = 25 }

# Gas reports
[profile.default.fmt]
bracket_spacing = true
int_types = "long"
line_length = 120
multiline_func_header = "attributes_first"
number_underscore = "thousands"
quote_style = "double"
single_line_statement_blocks = "single"
tab_width = 4
wrap_comments = true

# RPC endpoints para fork testing y deploy
[rpc_endpoints]
polygon_amoy = "${POLYGON_AMOY_RPC_URL}"
localhost = "http://127.0.0.1:8545"

# Etherscan (PolygonScan) para verificación
[etherscan]
polygon_amoy = { key = "${POLYGONSCAN_API_KEY}", url = "https://api-amoy.polygonscan.com/api", chain = 80002 }
